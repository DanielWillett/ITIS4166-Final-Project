openapi: 3.0.3

info:
  title: Inventory API
  version: 1.0.0
  description: API documentation for a service for tracking inventory stock.

servers:
  - url: http://localhost:8080/api
    description: Local development server.
  - url: https://inventory-service-b4rl.onrender.com/api
    description: Production server.

components:
  schemas:
    User: {
      "type": "object",
      "properties": {
        "id": {
          "type": "integer",
          "example": 2,
          "readOnly": true
        },
        "firstName": {
          "type": "string",
          "example": "John"
        },
        "lastName": {
          "type": "string",
          "example": "Doe"
        },
        "username": {
          "type": "string",
          "example": "username123",
          "readOnly": true
        },
        "createdById": {
          "type": "integer",
          "nullable": true,
          "minimum": 1,
          "example": 1,
          "readOnly": true
        },
        "createdAt": {
          "type": "string",
          "format": "date-time",
          "minimum": 1,
          "example": "2026-10-05T14:48:00.000Z",
          "readOnly": true
        },
        "role": {
          "type": "string",
          "enum": [ "read", "write", "admin" ]
        }
      }
    }
    CreatingUser: {
      "type": "object",
      "properties": {
        "firstName": {
          "type": "string",
          "example": "John"
        },
        "lastName": {
          "type": "string",
          "example": "Doe"
        },
        "username": {
          "type": "string",
          "example": "username123"
        },
        "password": {
          "type": "string",
          "example": "password123"
        },
        "role": {
          "type": "string",
          "enum": [ "read", "write", "admin" ]
        }
      }
    }
    ItemCategory: {
      "type": "object",
      "properties": {
        "id": {
          "type": "integer",
          "example": 2,
          "readOnly": true
        },
        "name": {
          "type": "string",
          "example": "Hardware"
        },
        "parent": {
          "type": "integer",
          "example": 1
        },
        "createdBy": {
          "type": "integer",
          "nullable": true,
          "example": 1,
          "readOnly": true
        },
        "createdAt": {
          "type": "string",
          "format": "date-time",
          "example": "2026-10-05T14:48:00.000Z",
          "readOnly": true
        }
      }
    }
    Item: {
      "type": "object",
      "properties": {
        "id": {
          "type": "integer",
          "example": 2,
          "readOnly": true
        },
        "name": {
          "type": "string",
          "example": "BOLT HEX HEAD HEX SOCKET 1/2\"-13"
        },
        "description": {
          "type": "string",
          "example": "1/2\"-13 Hex Head Bolt Hex Socket Drive Steel"
        },
        "createdBy": {
          "type": "integer",
          "nullable": true,
          "example": 1,
          "readOnly": true
        },
        "createdAt": {
          "type": "string",
          "format": "date-time",
          "example": "2026-10-05T14:48:00.000Z",
          "readOnly": true
        },
        "category": {
          "type": "integer",
          "example": 4
        }
      }
    }
    StockItem: {
      "type": "object",
      "properties": {
        "id": {
          "type": "integer",
          "example": 2,
          "readOnly": true
        },
        "item": {
          "type": "integer",
          "example": 1
        },
        "quantity": {
          "type": "number",
          "example": 10.0
        },
        "manufacturer": {
          "type": "string",
          "nullable": true,
          "example": "Kanebridge"
        },
        "vendor": {
          "type": "string",
          "nullable": true,
          "example": "DigiKey"
        },
        "url": {
          "type": "string",
          "nullable": true,
          "example": "https://www.digikey.com/en/products/detail/fix-supply/5032BHH7/21649245",
          "format": "uri"
        },
        "location": {
          "type": "string",
          "example": "Bldg 1A, Room 114, Shelf 3"
        },
        "createdBy": {
          "type": "integer",
          "nullable": true,
          "example": 1,
          "readOnly": true
        },
        "createdAt": {
          "type": "string",
          "format": "date-time",
          "example": "2026-10-05T14:48:00.000Z",
          "readOnly": true
        }
      }
    }
    UpdateStockItem: {
      "type": "object",
      "properties": {
        "id": {
          "type": "integer",
          "example": 2,
          "readOnly": true
        },
        "item": {
          "type": "integer",
          "example": 1,
          "readOnly": true
        },
        "quantity": {
          "type": "number",
          "example": 10.0
        },
        "manufacturer": {
          "type": "string",
          "nullable": true,
          "example": "Kanebridge"
        },
        "vendor": {
          "type": "string",
          "nullable": true,
          "example": "DigiKey"
        },
        "url": {
          "type": "string",
          "nullable": true,
          "example": "https://www.digikey.com/en/products/detail/fix-supply/5032BHH7/21649245",
          "format": "uri"
        },
        "location": {
          "type": "string",
          "example": "Bldg 1A, Room 114, Shelf 3"
        },
        "createdBy": {
          "type": "integer",
          "nullable": true,
          "example": 1,
          "readOnly": true
        },
        "createdAt": {
          "type": "string",
          "format": "date-time",
          "example": "2026-10-05T14:48:00.000Z",
          "readOnly": true
        }
      }
    }
    StockItemRecord: {
      "type": "object",
      "properties": {
        "id": {
          "type": "integer",
          "example": 2,
          "readOnly": true
        },
        "stockItem": {
          "type": "integer",
          "example": 1,
          "readOnly": true
        },
        "fieldId": {
          "type": "integer",
          "example": 4,
          "readOnly": true
        },
        "description": {
          "type": "string",
          "example": "Property location changed to 'Bldg 1A, Room 114, Shelf 3'",
          "readOnly": true
        },
        "oldValue": {
          "type": "string",
          "example": "Bldg 1A, Room 114, Shelf 2",
          "readOnly": true
        },
        "user": {
          "type": "integer",
          "nullable": true,
          "example": 2,
          "readOnly": true
        },
        "timestamp": {
          "type": "string",
          "format": "date-time",
          "example": "2026-10-05T14:48:00.000Z",
          "readOnly": true
        }
      }
    }
  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: User ID
      schema: {
        "type": "integer",
        "example": 1
      }
    ItemCategoryId:
      name: id
      in: path
      required: true
      description: Item Category ID
      schema: {
        "type": "integer",
        "example": 2
      }
    ItemId:
      name: id
      in: path
      required: true
      description: Item ID
      schema: {
        "type": "integer",
        "example": 1
      }
    StockItemId:
      name: id
      in: path
      required: true
      description: Stock Item ID
      schema: {
        "type": "integer",
        "example": 1
      }
    StockItemRecordId:
      name: id
      in: path
      required: true
      description: Stock Item Record ID
      schema: {
        "type": "integer",
        "example": 1
      }
  responses:
    InvalidUserInput:
      description: Invalid input data in a request.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "errors": {
                "type": "array",
                "items": {
                  "type": "string"
                }
              }
            },
            "example": {
              "errors": [ "Expected either 'asc' or 'desc' for 'sort' parameter." ]
            }
          }
    InvalidResourceID:
      description: Invalid ID in path.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "errors": {
                "type": "array",
                "items": {
                  "type": "string"
                }
              }
            },
            "example": {
              "errors": [ "'id' parameter must be an integer >= 1." ]
            }
          }
    ResourceNotFound:
      description: Resource with the given ID doesn't exist.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "error": {
                "type": "string"
              }
            },
            "example": {
              "error": "User 957 not found."
            }
          }
    MissingAuthorization:
      description: Either missing an authorization header or token is expired or malformed.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "error": {
                "type": "string"
              }
            },
            "example": {
              "error": "Unable to authenticate, missing bearer token."
            }
          }
    MissingPermission:
      description: An endpoint requires write or admin access and the logged in user doesn't have a high enough role.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "error": {
                "type": "string"
              }
            },
            "example": {
              "error": "Unauthorized, requires write access."
            }
          }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Auth
    description: Operations for signing up and logging in.
  - name: Users
    description: Operations related to users.
  - name: Items
    description: A generic type of item that can contain multiple stock items.
  - name: Stock Items
    description: A specific set of objects in stock for an item.
  - name: Item Categories
    description: Operations related to item categories.
  - name: Stock Item Records
    description: Change history from stock items.

paths:
  /auth/create-user:
    post:
      summary: Create a new user.
      description: Create a new user login.
      tags: [ Auth ]
      requestBody:
        description: Information about the new user.
        required: true
        content:
          application/json:
            schema: {
              "$ref": "#/components/schemas/CreatingUser"
            }
      security:
        - bearerAuth: [ ]
      responses:
        "201":
          description: User created successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/User"
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "403":
          $ref: "#/components/responses/MissingPermission"
        "409":
          description: Username already in use.
          content:
            application/json:
              schema: {
                "type": "object",
                "properties": {
                  "error": {
                    "type": "string"
                  }
                },
                "example": {
                  "error": "Username already used."
                }
              }
  /auth/login:
    post:
      summary: Login to a user account.
      description: Get a temporary access token for a user account.
      tags: [ Auth ]
      requestBody:
        description: User login credentials.
        required: true
        content:
          application/json:
            schema: {
              "type": "object",
              "properties": {
                "username": {
                  "type": "string",
                  "example": "username123"
                },
                "password": {
                  "type": "string",
                  "example": "pa55w0rd!"
                }
              }
            }
      responses:
        "200":
          description: User logged in successfully.
          content:
            application/json:
              schema: {
                "type": "object",
                "properties": {
                  "token": {
                    "type": "string",
                  }
                },
                "example": {
                  "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6Mywicm9sZSI6IkFETUlOIiwiaWF0IjoxNzc1NjEwMzk5LCJleHAiOjE3NzU2MTM5OTl9.QFC0JfaOTIgxlZhIEv5hCDgvJryz2QCwq4HqvQLjVec"
                }
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          description: Invalid credentials.
          content:
            application/json:
              schema: {
                "type": "object",
                "properties": {
                  "error": {
                    "type": "string"
                  }
                },
                "example": {
                  "error": "Invalid credentials."
                }
              }
  /users:
    get:
      summary: Get all users.
      description: Retrieve a list of all users.
      tags: [ Users ]
      parameters:
        - name: offset
          in: query
          description: Number of users to skip in response. Used for pagination.
          schema: {
            "type": "number",
            "minimum": 0
          }
          required: false
        - name: limit
          in: query
          description: Number of users in one response. Used for pagination. -1 indicates infinite responses.
          schema: {
            "type": "number",
            "minimum": -1
          }
          required: false
        - name: searchBy
          in: query
          description: Field to search by. Can use 'realName' to search both first and last name.
          schema: {
            "type": "string",
            "enum": [ "username", "firstName", "lastName", "realName", "createdBy", "role" ]
          }
          required: false
        - name: search
          in: query
          description: Text to search for. Defaults to searching the user's first and last name but 'searchBy' can be used to search other fields.
          schema: {
            "type": "string"
          }
          required: false
        - name: orderBy
          in: query
          description: Field to sort results by. Defaults to 'id'.
          schema: {
            "type": "string",
            "enum": [ "id", "username", "firstName", "lastName", "createdBy", "createdAt" ]
          }
          required: false
        - name: sort
          in: query
          description: Order to sort results in. Ascending ('asc', low-to-high) or descending ('desc', high-to-low). Defaults to ascending.
          schema: {
            "type": "string",
            "enum": [ "asc", "desc" ]
          }
          required: false
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: A list of users.
          content:
            application/json:
              schema: {
                "type": "array",
                "items": {
                  "$ref": "#/components/schemas/User"
                }
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
  /users/{id}:
    get:
      summary: Get one user.
      description: Get a user by their primary key.
      tags: [ Users ]
      parameters:
        - $ref: "#/components/parameters/UserId"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: User found successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/User"
              }
        "400":
          $ref: "#/components/responses/InvalidResourceID"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
    patch:
      summary: Update user info.
      description: Update basic information about a users.
      tags: [ Users ]
      parameters:
        - $ref: "#/components/parameters/UserId"
      security:
        - bearerAuth: [ ]
      requestBody:
        description: The properties to update on the user.
        required: true
        content:
          application/json:
            schema: {
              "$ref": "#/components/schemas/User"
            }
      responses:
        "200":
          description: User found and updated successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/User"
              }
        "400":
          $ref: "#/components/responses/InvalidResourceID"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "403":
          $ref: "#/components/responses/MissingPermission"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
  /item-categories:
    get:
      summary: Get all categories.
      description: Retrieve a list of all item categories.
      tags: [ Item Categories ]
      parameters:
        - name: offset
          in: query
          description: Number of categories to skip in response. Used for pagination.
          schema: {
            "type": "number",
            "minimum": 0
          }
          required: false
        - name: limit
          in: query
          description: Number of categories in one response. Used for pagination. -1 indicates infinite responses.
          schema: {
            "type": "number",
            "minimum": -1
          }
          required: false
        - name: searchBy
          in: query
          description: Field to search by.
          schema: {
            "type": "string",
            "enum": [ "name", "parent", "createdBy" ]
          }
          required: false
        - name: search
          in: query
          description: Text to search for. Defaults to searching the category name but 'searchBy' can be used to search other fields.
          schema: {
            "type": "string"
          }
          required: false
        - name: orderBy
          in: query
          description: Field to sort results by. Defaults to 'id'.
          schema: {
            "type": "string",
            "enum": [ "id", "name", "parent", "createdBy", "createdAt" ]
          }
          required: false
        - name: sort
          in: query
          description: Order to sort results in. Ascending ('asc', low-to-high) or descending ('desc', high-to-low). Defaults to ascending.
          schema: {
            "type": "string",
            "enum": [ "asc", "desc" ]
          }
          required: false
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: A list of item categories.
          content:
            application/json:
              schema: {
                "type": "array",
                "items": {
                  "$ref": "#/components/schemas/ItemCategory"
                }
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
    post:
      summary: Create an item category.
      description: Create a new item category.
      tags: [ Item Categories ]
      security:
        - bearerAuth: [ ]
      requestBody:
        description: Information about the new category.
        required: true
        content:
          application/json:
            schema: {
              "$ref": "#/components/schemas/ItemCategory"
            }
      responses:
        "201":
          description: Item category created.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/ItemCategory"
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "403":
          $ref: "#/components/responses/MissingPermission"
  /item-categories/{id}:
    get:
      summary: Get one item category.
      description: Get an item category by its primary key.
      tags: [ Item Categories ]
      parameters:
        - $ref: "#/components/parameters/ItemCategoryId"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: Item category found successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/ItemCategory"
              }
        "400":
          $ref: "#/components/responses/InvalidResourceID"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
    patch:
      summary: Update item category info.
      description: Update basic information about an item category.
      tags: [ Item Categories ]
      parameters:
        - $ref: "#/components/parameters/ItemCategoryId"
      security:
        - bearerAuth: [ ]
      requestBody:
        description: The properties to update on the category.
        required: true
        content:
          application/json:
            schema: {
              "$ref": "#/components/schemas/ItemCategory"
            }
      responses:
        "200":
          description: Item category found and updated successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/ItemCategory"
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "403":
          $ref: "#/components/responses/MissingPermission"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
    delete:
      summary: Delete an item category.
      description: Delete an item category by its primary key and all it's children.
      tags: [ Item Categories ]
      parameters:
        - $ref: "#/components/parameters/ItemCategoryId"
      security:
        - bearerAuth: [ ]
      responses:
        "204":
          description: Item category deleted successfully.
        "400":
          $ref: "#/components/responses/InvalidResourceID"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "403":
          $ref: "#/components/responses/MissingPermission"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
  /items:
    get:
      summary: Get all items.
      description: Retrieve a list of all items.
      tags: [ Items ]
      parameters:
        - name: offset
          in: query
          description: Number of items to skip in response. Used for pagination.
          schema: {
            "type": "number",
            "minimum": 0
          }
          required: false
        - name: limit
          in: query
          description: Number of items in one response. Used for pagination. -1 indicates infinite responses.
          schema: {
            "type": "number",
            "minimum": -1
          }
          required: false
        - name: searchBy
          in: query
          description: Field to search by.
          schema: {
            "type": "string",
            "enum": [ "name", "description", "createdBy", "category" ]
          }
          required: false
        - name: search
          in: query
          description: Text to search for. Defaults to searching the item name but 'searchBy' can be used to search other fields.
          schema: {
            "type": "string"
          }
          required: false
        - name: orderBy
          in: query
          description: Field to sort results by. Defaults to 'id'.
          schema: {
            "type": "string",
            "enum": [ "id", "name", "description", "category", "createdBy", "createdAt" ]
          }
          required: false
        - name: sort
          in: query
          description: Order to sort results in. Ascending ('asc', low-to-high) or descending ('desc', high-to-low). Defaults to ascending.
          schema: {
            "type": "string",
            "enum": [ "asc", "desc" ]
          }
          required: false
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: A list of items.
          content:
            application/json:
              schema: {
                "type": "array",
                "items": {
                  "$ref": "#/components/schemas/Item"
                }
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
    post:
      summary: Create an item.
      description: Create a new item.
      tags: [ Items ]
      security:
        - bearerAuth: [ ]
      requestBody:
        description: Information about the item.
        required: true
        content:
          application/json:
            schema: {
              "$ref": "#/components/schemas/Item"
            }
      responses:
        "201":
          description: Item created.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/Item"
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "403":
          $ref: "#/components/responses/MissingPermission"
  /items/{id}:
    get:
      summary: Get one item.
      description: Get an item by its primary key.
      tags: [ Items ]
      parameters:
        - $ref: "#/components/parameters/ItemId"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: Item found successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/Item"
              }
        "400":
          $ref: "#/components/responses/InvalidResourceID"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
    patch:
      summary: Update item info.
      description: Update basic information about an item.
      tags: [ Items ]
      parameters:
        - $ref: "#/components/parameters/ItemId"
      security:
        - bearerAuth: [ ]
      requestBody:
        description: The properties to update on the item.
