openapi: 3.0.3

info:
  title: Inventory API
  version: 1.0.0
  description: API documentation for a service for tracking inventory stock.

servers:
  - url: http://localhost:8080/api

components:
  schemas:
    User: {
      "type": "object",
      "properties": {
        "id": {
          "type": "integer",
          "example": 2,
          "readOnly": true
        },
        "firstName": {
          "type": "string",
          "example": "John"
        },
        "lastName": {
          "type": "string",
          "example": "Doe"
        },
        "username": {
          "type": "string",
          "example": "username123",
          "readOnly": true
        },
        "createdById": {
          "type": [ "number", "null" ],
          "minimum": 1,
          "example": 1,
          "readOnly": true
        },
        "createdAt": {
          "type": "string",
          "format": "date",
          "minimum": 1,
          "example": "2026-10-05T14:48:00.000Z",
          "readOnly": true
        }
      }
    }
    CreatingUser: {
      "type": "object",
      "properties": {
        "firstName": {
          "type": "string",
          "example": "John"
        },
        "lastName": {
          "type": "string",
          "example": "Doe"
        },
        "username": {
          "type": "string",
          "example": "username123"
        }
      }
    }
  parameters:
    UserId:
      name: id
      in: path
      required: true
      description: User ID
      schema: {
        "type": "integer",
        "example": 1
      }
  responses:
    InvalidUserInput:
      description: Invalid input data in a request.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "errors": {
                "type": "array",
                "items": {
                  "type": "string"
                }
              }
            },
            "example": {
              "errors": [ "Expected either 'asc' or 'desc' for 'sort' parameter." ]
            }
          }
    InvalidResourceID:
      description: Invalid ID in path.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "errors": {
                "type": "array",
                "items": {
                  "type": "string"
                }
              }
            },
            "example": {
              "errors": [ "'id' parameter must be an integer >= 1." ]
            }
          }
    ResourceNotFound:
      description: Resource with the given ID doesn't exist.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "error": {
                "type": "string"
              }
            },
            "example": {
              "error": "User 957 not found."
            }
          }
    MissingAuthorization:
      description: Either missing an authorization header or token is expired or malformed.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "error": {
                "type": "string"
              }
            },
            "example": {
              "error": "Unable to authenticate, missing bearer token."
            }
          }
    MissingPermission:
      description: An endpoint requires write or admin access and the logged in user doesn't have a high enough role.
      content:
        application/json:
          schema: {
            "type": "object",
            "properties": {
              "error": {
                "type": "string"
              }
            },
            "example": {
              "error": "Unauthorized, requires write access."
            }
          }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: Users
    description: Operations related to users.
  - name: Auth
    description: Operations for signing up and logging in.

paths:
  /auth/create-user:
    post:
      summary: Create a new user.
      description: Create a new user login.
      tags: [ Auth ]
      requestBody:
        description: Information about the new user.
        required: true
        content:
          application/json:
            schema: {
              "$ref": "#/components/schemas/CreatingUser"
            }
      security:
        - bearerAuth: [ ]
      responses:
        "201":
          description: User created successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/User"
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "403":
          $ref: "#/components/responses/MissingPermission"
        "409":
          description: Username already in use.
          content:
            application/json:
              schema: {
                "type": "object",
                "properties": {
                  "error": {
                    "type": "string"
                  }
                },
                "example": {
                  "error": "Username already used."
                }
              }
  /auth/login:
    post:
      summary: Login to a user account.
      description: Get a temporary access token for a user account.
      tags: [ Auth ]
      requestBody:
        description: User login credentials.
        required: true
        content:
          application/json:
            schema: {
              "type": "object",
              "properties": {
                "username": {
                  "type": "string",
                  "example": "username123"
                },
                "password": {
                  "type": "string",
                  "example": "pa55w0rd!"
                }
              }
            }
      responses:
        "200":
          description: User logged in successfully.
          content:
            application/json:
              schema: {
                "type": "object",
                "properties": {
                  "token": {
                    "type": "string",
                  }
                },
                "example": {
                  "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6Mywicm9sZSI6IkFETUlOIiwiaWF0IjoxNzc1NjEwMzk5LCJleHAiOjE3NzU2MTM5OTl9.QFC0JfaOTIgxlZhIEv5hCDgvJryz2QCwq4HqvQLjVec"
                }
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
        "401":
          description: Username already in use.
          content:
            application/json:
              schema: {
                "type": "object",
                "properties": {
                  "error": {
                    "type": "string"
                  }
                },
                "example": {
                  "error": "Invalid credentials."
                }
              }
  /users:
    get:
      summary: Get all users.
      description: Retrieve a list of all users.
      tags: [ Users ]
      parameters:
        - name: offset
          in: query
          description: Number of users to skip in response. Used for pagination.
          schema: {
            "type": "number",
            "minimum": 0,
            "example": 10
          }
          required: false
        - name: limit
          in: query
          description: Number of users in one response. Used for pagination. -1 indicates infinite responses.
          schema: {
            "type": "number",
            "minimum": -1,
            "example": 5
          }
          required: false
        - name: searchBy
          in: query
          description: Field to search by. Can use 'realName' to search both first and last name.
          schema: {
            "type": "string",
            "example": "realName",
            "enum": [ "username", "firstName", "lastName", "realName" ]
          }
          required: false
        - name: search
          in: query
          description: Text to search for. Defaults to searching the user's first and last name but 'searchBy' can be used to search other fields.
          schema: {
            "type": "string",
            "example": "John Doe"
          }
          required: false
        - name: orderBy
          in: query
          description: Field to sort results by. Defaults to 'id'.
          schema: {
            "type": "string",
            "example": "realName",
            "enum": [ "id", "username", "firstName", "lastName", "createdBy", "createdAt" ]
          }
          required: false
        - name: sort
          in: query
          description: Order to sort results in. Ascending ('asc', low-to-high) or descending ('desc', high-to-low). Defaults to ascending.
          schema: {
            "type": "string",
            "example": "realName",
            "enum": [ "asc", "desc" ]
          }
          required: false
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: A list of blogs
          content:
            application/json:
              schema: {
                "type": "array",
                "items": {
                  "$ref": "#/components/schemas/User"
                }
              }
        "400":
          $ref: "#/components/responses/InvalidUserInput"
  /users/{id}:
    get:
      summary: Get one user.
      description: Get a user by their primary key.
      tags: [ Users ]
      parameters:
        - $ref: "#/components/parameters/UserId"
      security:
        - bearerAuth: [ ]
      responses:
        "200":
          description: User found successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/User"
              }
        "400":
          $ref: "#/components/responses/InvalidResourceID"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
    patch:
      summary: Update user info.
      description: Update basic information about a users.
      tags: [ Users ]
      parameters:
        - $ref: "#/components/parameters/UserId"
      security:
        - bearerAuth: [ ]
      requestBody:
        description: The properties to update on the user.
        required: true
        content:
          application/json:
            schema: {
              "$ref": "#/components/schemas/User"
            }
      responses:
        "200":
          description: User found and updated successfully.
          content:
            application/json:
              schema: {
                "$ref": "#/components/schemas/User"
              }
        "400":
          $ref: "#/components/responses/InvalidResourceID"
        "401":
          $ref: "#/components/responses/MissingAuthorization"
        "403":
          $ref: "#/components/responses/MissingPermission"
        "404":
          $ref: "#/components/responses/ResourceNotFound"
        